<!DOCTYPE html>
<html class="isBF">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>Betaflight - Blackbox Explorer</title>
    <link rel="icon" type="image/png" href="images/bf_icon_128.png">
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="src/css/main.css">
</head>

<body>
    <!-- Vue teleport targets -->
    <div id="vue-welcome"></div>
    <div id="vue-navbar" class="app-navbar" style="z-index: 100"></div>
    <!-- Main Page -->
    <div class="app-main-pane">
        <ul class="video-top-controls list-none pl-0">
            <div id="vue-view-controls" style="display: contents"></div>
            <div id="vue-playback" style="display: contents"></div>
            <div id="vue-speed-panel" style="display: contents"></div>
            <div id="vue-zoom-panel" style="display: contents"></div>
            <div id="vue-time-panel" style="display: contents"></div>
            <div id="vue-sync-panel" style="display: contents"></div>
            <div id="vue-workspace-panel" style="display: contents"></div>
        </ul>
        <div id="screenshot-frame" class="graph-row">
            <div class="log-graph">
                <video></video>
                <canvas width="200" height="100" id="graphCanvas"></canvas>
                <canvas width="0" height="0" id="craftCanvas"></canvas>
                <div id="vue-analyser" style="display: contents"></div>
                <div id="mapContainer" class="map-container"></div>
                <canvas width="0" height="0" id="stickCanvas"></canvas>
                <span class="log-open-legend-dialog" title="Show the legend" style="cursor:pointer"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></span>
            </div>
            <div id="vue-legend-panel" style="display: contents"></div>
            <div class="mouseNotification"></div>
        </div>
        <div id="vue-field-values" style="display: contents"></div>
        <div class="configuration-file" id="configuration-file">
            <!-- auto filled by configuration function -->
        </div>
    </div>
    <!-- Log Scroll bar -->
    <div id="log-seek-bar" class="log-seek-bar">
        <canvas id="seekbarCanvas" width="200" height="100"></canvas>
        <div id="vue-seekbar-toolbar" style="display: contents"></div>
    </div>
    <!-- Vue Status Bar -->
    <div id="vue-statusbar" class="vue-statusbar"></div>

    <!-- Scripts -->
    <script src="/js/complex.js"></script>
    <script src="/js/real.js"></script>
    <script src="/js/three.min.js"></script>
    <script src="/js/FileSaver.js"></script>
    <script src="/js/semver.js"></script>
    <script src="/js/webm-writer/ArrayBufferDataStream.js"></script>
    <script src="/js/webm-writer/BlobBuffer.js"></script>
    <script src="/js/webm-writer/WebMWriter.js"></script>
    <div id="vue-app"></div>
    <script type="module" src="src/vue_init.js"></script>
    <script type="module" src="src/main.js"></script>
    </body>

</html>
